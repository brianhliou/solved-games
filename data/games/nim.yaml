notes: >
  Strongly solved in the strongest possible sense: Bouton (1901-1902) gave an
  exact, closed-form classification of every position, not just the start. A
  position is a P-position (previous player / second player wins, i.e. a loss
  for the player to move) if and only if the nim-sum — the bitwise XOR of the
  heap sizes — equals zero; otherwise it is an N-position (next player / first
  player wins). The optimal move from any N-position is to take counters so that
  the resulting nim-sum is zero, which always exists. This is a mathematical
  proof rather than a tablebase enumeration, but it yields the value and a
  winning move for ALL (arbitrarily large, arbitrarily many) reachable
  positions, so it qualifies as a strong solution.

  state_space and game_tree are left unset because Nim has no single fixed
  board: the number of positions is unbounded (it depends on the chosen number
  and sizes of heaps), so no finite canonical complexity figure applies. The
  headline result uses normal play (last player to move WINS), which is what
  Bouton's main theorem covers.

  Bouton's paper also treats the misère variant (last player to move LOSES): the
  optimal strategy is identical to normal play until all remaining heaps have
  size 1, at which point the player aims to leave an ODD number of size-1 heaps
  (vs. an even number in normal play). Outcome of misère Nim therefore differs
  only in endgame parity; the misère 3-5-7 start is also a first-player win.

  Nim is foundational to combinatorial game theory: the Sprague-Grundy theorem
  (R. P. Sprague 1935, P. M. Grundy 1939) generalized Bouton's nim-sum to show
  that every impartial game under normal play is equivalent to a single Nim
  heap (its Grundy value / nimber), making Nim the canonical impartial game.
