notes: >
  Y is a connection game on a triangular grid: place stones in turn, win by
  joining all three sides with one connected group. It generalizes Hex (Hex
  reduces to Y), and like Hex it cannot end in a draw — by the Y theorem a full
  board always has exactly one player connecting all three sides, and the two
  players can never connect at once.

  ULTRA-WEAK result, ALL board sizes: the first player wins on any board by the
  Hex-style strategy-stealing argument (Schensted & Titus 1975, after Nash). This
  is non-constructive — it names no moves.

  STRONG result, sides 1-6 (this project): we computed the game-theoretic value of
  every position by retrograde analysis. The first player wins from the start at
  every size, and no position is a draw — both asserted as correctness invariants
  (a wrong board model would surface a draw). Sizes and starting value:
  side 1 (2 positions), side 2 (13), side 3 (257), side 4 (16,505), side 5
  (3,337,584 reachable), side 6 (2,173,243,128 count-legal index) — first player
  wins at every size.

  METRIC NOTE: sides 1-5 figures count reachable positions (forward discovery);
  the side-6 figure counts the tight count-legal index (a superset that also
  includes count-legal-but-unreachable positions), because side-6 was solved by
  the dense slice solver rather than reachable enumeration. The two metrics are
  not directly comparable; wins + losses equal the total exactly at every size,
  which is the no-draw invariant.

  ORIGINALITY / prior art: the only prior solver located is GamesCrafters'
  GamesmanClassic `mgameofy.c` (A. Esteban, 2023), which has Y code for dims 4-7
  but publishes no game values, has no accompanying paper, and declares draws
  possible (`kTieIsPossible = TRUE`) for a game that cannot draw; an adversarial
  check could confirm only its dim-5 as credibly computed. This entry is therefore
  the first documented, verified, draw-correct strong solution of Y, claimed for
  the bounded sizes solved (1-6), with full credit to the prior GamesCrafters work.

  Side-7 (28 cells) has a count-legal index beyond 2^32 and is the natural next
  target via external-memory (disk-paged) slices.
