id: y
name: Y (side 6)
also_known_as:
  - "Game of Y"
  - "Y-game"
family: connection
genre: connection
board: >
  Triangular board of hexagonal cells; side n has n rows and n(n+1)/2 cells (side
  6 = 21 cells). Players alternately place a stone of their colour on an empty
  cell; a player wins by connecting all three sides of the triangle with one
  group. Hex reduces to Y. Strongly solved here for sides 1-6.
result: first-player-win
result_detail: "First player wins. Strongly solved for board sides 1-6 — the game-theoretic value of every position is known — and the first player wins from the start at every size. Y can never draw (the Y theorem), confirmed: every position is a win or a loss."
strength: strong
method:
  - retrograde-analysis
  - brute-force-enumeration
distance_to_result: "Side-6 (2,173,243,128 positions) solved in ~13 minutes in ~1 GB of RAM on a single core, by slice-by-slice retrograde over the ply-layers."
