notes: >
  Sim was invented by Gustavus J. Simmons in 1969 (Journal of Recreational
  Mathematics, vol. 2, p. 66). It is a misere (avoidance) positional game on the
  complete graph K6: two players alternately color the 15 edges, each in their own
  color, and the player who first completes a triangle entirely in their own color
  loses. Because the Ramsey number R(3,3) = 6, every 2-coloring of K6 contains a
  monochromatic triangle, so a draw is impossible -- exactly one player is forced to
  complete a triangle. The game is named the "Hales-Jewett game" after the founders of
  positional-game theory (Hales & Jewett), of which Sim is a classic example, and is
  also called the R(3,3) avoidance game.

  Result: the SECOND player wins with perfect play. The first explicit, human-readable
  winning strategy was published by Mead, Rosa & Huang in 1974 (Mathematics Magazine
  47(5):243-247), backed by computer search; they themselves noted that a simpler,
  easier-to-memorize strategy was still desirable. Wolfgang Slany's 1999 report "Graph
  Ramsey Games" (arXiv:cs/9911004) independently "strongly" and "ultra-strongly" solved
  Sim by exhaustive computation -- computing optimal play (the game-theoretic value) for
  all reachable positions, i.e. a full database, which is why this record is classified
  as STRONG rather than merely weak. Slany also proved the general class of graph Ramsey
  avoidance games PSPACE-complete. A simpler human-playable winning strategy was given by
  Wrzos-Kaminska in 2020 (arXiv:2001.04024).

  State-space figure 14,348,907 = 3^15 is the TOTAL upper bound on edge labelings (each of
  the 15 edges is uncolored / first-player-colored / second-player-colored); the number of
  reachable, non-isomorphic positions is far smaller after symmetry reduction (K6 has a
  large automorphism group). The "year" field uses 1974 (first established winning strategy
  / second-player-win determination); the strong/ultra-strong full solution dates to Slany
  1999. distance_to_result is bounded by the 15 edges; the game cannot last beyond move 15.
