notes: >
  Three men's morris is the "movement" extension of three-in-a-row (it is to
  tic-tac-toe what nine men's morris is to a placement-only mill game). Each player
  places three pieces, then slides them; a player wins by getting all three on a
  line (or leaving the opponent with no move).

  This is a trivial game — well under 10^4 positions, strongly solvable by
  inspection — so its standing here is the same as tic-tac-toe's: a classically
  known result, no solving credit claimed. The first player wins, and only by
  taking the centre: corners draw and edges lose; with the centre opening banned
  the game is a draw (which is why most informal rule-sets ban it). The
  first-player centre win has been understood as folklore for centuries (the board
  appears in the 1283 Libro de los juegos and in far older carvings); Murray (1952)
  is the classical reference.

  This project's open solver (engine/, the Tapatan ruleset) reproduces the result
  and contributes the full opening classification (centre wins uniquely; corners
  draw; edges lose). It is listed only as a reproducible verifier — the game is too
  trivial to claim as a solve.
