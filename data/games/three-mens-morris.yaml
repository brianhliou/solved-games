notes: >
  Three men's morris is the "movement" extension of three-in-a-row (it is to
  tic-tac-toe what nine men's morris is to a placement-only mill game). Each
  player has three pieces. PLACEMENT PHASE: players alternately place their
  three pieces on empty points; if neither has made a line, the game enters the
  MOVEMENT PHASE in which players alternately slide one piece to an empty point.
  A player wins by getting their three pieces onto one of the eight lines
  (3 rows, 3 columns, 2 diagonals). Two movement rulesets exist: pieces move to
  ANY vacant point (the common rule), or only to an ADJACENT linked vacant point
  (Murray's stricter "smaller merels" rule). The headline result holds in the
  standard unrestricted game.

  RESULT AND RULESET CAVEAT (the central subtlety): under unrestricted standard
  rules the FIRST PLAYER WINS — opening in the centre is a forced win. Because
  this makes the natural opening dominant, most informal rule-sets BAN the
  first-player centre opening; with that restriction neither side can force a
  win and the game is effectively a DRAW. So the value depends entirely on
  whether the centre opening is allowed: centre allowed => first-player win;
  centre banned => draw. The headline fields record the standard (centre-allowed)
  game. Some popular sources loosely call the (centre-banned) game "a draw with
  perfect play"; that describes the restricted variant, not the unrestricted one.

  STRENGTH: classified "weak" (downgraded from an earlier "strong" draft). The
  game is trivially small (well under 10^4 reachable arrangements of 3+3 pieces on
  9 points), so a STRONG solution is feasible in principle — but the cited
  evidence does not establish one. Jim Randell's solver (New Scientist
  Headscratcher #245, 2023) HARD-CODES the first player's centre opening and only
  searches the resulting subtree; it proves a winning strategy FROM THE START
  (a weak solution of the centre line), not a value for every reachable position,
  so no full tablebase / strong solution is on record. An exhaustive all-positions
  solve would qualify as strong but has not been published for this game.

  DISTANCE: the entire game is at most 9 moves (5 by the first player "Alpha",
  4 by the second player "Zoe"); after the central opening the first player
  forces the win within 7 more plies. The New Scientist published answer phrases
  this as "Alpha can win in four more moves" (counting only Alpha's own moves).

  COMPLEXITY: no single canonical citable state-space / game-tree figure is
  published (the game is too trivially small to have entered the standard
  "Games solved" complexity tables); both fields are left null rather than
  guessed. State space is on the order of a few thousand reachable positions.

  ATTRIBUTION: there is no single primary "solver" paper — the first-player
  forced win from the centre has been understood as folklore/strategic knowledge
  for centuries (the board appears in the 1283 Libro de los juegos of Alfonso X
  and in far older Egyptian/Roman carvings). H. J. R. Murray's "A History of
  Board-Games Other Than Chess" (1952) is the classical scholarly reference and
  source of the "smaller merels"/"nine holes" classification. The most concrete,
  reproducible modern confirmation is the exhaustive computer analysis in the
  New Scientist Headscratcher #245 puzzle and Jim Randell's accompanying solver
  (2023). Wikipedia and the hobby/history pages are secondary restatements.
