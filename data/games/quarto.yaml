distance_to_result: "Game value (draw) holds from the start (0+1). Deepest non-trivial forced win is at level 4+1; no non-trivial win exists above level 4+1 (i.e. from level 2+1 onward it does not matter what you play, and from 3+1 it suffices to look for a draw)."
