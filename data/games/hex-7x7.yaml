  - threat-space-search
distance_to_result: "Longest line of play is given for each of the 49 openings; the hardest single opening took ~110 hours of search, ~615 hours total for all 49 (single-processor AMD Athlon, 2003). No single uniform ply count — proof depth varies by opening."
