result: first-player-win
result_detail: "First player wins with perfect play. All 49 opening moves are resolved: central openings (and the obtuse-corner short diagonal) win for the first player, and a band of 14 losing openings clusters near the two acute corners (Yang et al. derived them by symmetry), so the first player wins by opening on a central cell (e.g. the centre cell d4)."
