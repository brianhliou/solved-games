notes: >
  WEAK solution, not strong. Pawlewicz & Hayward weakly solved 9×9 Hex by
  resolving every opening move: their Scalable Parallel Depth-First Proof Number
  Search (SPDFPN) solved all thirteen 9×9 openings that earlier solvers had left
  intractable (the remaining openings were already known), determining the winner
  for each of the 81 starting cells. This does NOT produce a value for every
  reachable position (no full tablebase), so it is not a strong solution. SPDFPN
  is a shared-memory parallel version of the serial DFPN 1+ε method (Pawlewicz &
  Lew), running atop the Benzene/Solver Hex codebase; it uses proof/disproof
  numbers only and no domain-specific heuristics for thread scheduling, while the
  underlying Hex solver uses connection-based virtual connections, inferior-cell
  pruning and early win/loss detection. The hardest 9×9 opening (a6) took 111
  days on a 24-core machine; the same run also produced the first-ever solution
  of a single 10×10 opening (the centremost cell, f5, in 63 days — Black wins).

  Ruleset caveat: this is the no-swap (no pie-rule) game. Under the swap/pie rule
  the second player can flip a winning first move, which changes the practical
  game but not the cell-by-cell opening values reported here.

  Lineage of forward-Hex solves: 7×7 — Jing Yang, Simon Liao & Mirek Pawlak
  (explicit decomposition strategy, 2001-2002) and independently a full computer
  solve by Hayward, Björnsson, Johanson, Kan, Po & van Rijswijck (2003);
  8×8 — Henderson, Arneson & Hayward (IJCAI 2009, all openings); 9×9 — this work
  (2013); 10×10 — only the central opening (2013).

  Ultra-weak result, ALL board sizes: independently of any search, Hex on any
  n×n board is a first-player win by John Nash's strategy-stealing argument
  (c. 1949) combined with the Hex theorem (Hein 1942 / Nash / Gale) that Hex can
  never be a draw — exactly one player connects. This is non-constructive: it
  proves the first player wins without giving a winning move. The 9×9 result here
  is the constructive WEAK upgrade for that specific size. Deciding an arbitrary
  generalized-Hex position is PSPACE-complete (Even & Tarjan, 1976; Reisch
  showed Hex itself PSPACE-complete, 1981), which is why explicit solving stalls
  around 9×9-10×10.

  Complexity: no 9×9-specific state-space/game-tree figure is cited in the
  primary paper. For reference, surveys give 11×11 Hex a state-space complexity
  of roughly 10^57 and game-tree complexity of roughly 10^98; 9×9 is
  correspondingly smaller. The state_space/game_tree fields are left null rather
  than guessing a 9×9 number.

  Bibliographic note: the paper was presented at Computers and Games 2013; its
  Springer LNCS 8427 proceedings carry a 2014 imprint. The result is universally
  dated 2013 (matching the conference and the anchor), which is the year used here.
