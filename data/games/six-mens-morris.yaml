notes: >
  Six men's morris is played on the two-ring (16-point) board — the nine men's
  morris board with its outer square removed — with 6 men per side and no
  diagonals. Standard capture rules: forming a mill (three in a line) removes one
  opponent man (one not itself in a mill, unless all are); a player loses when
  reduced below 3 men or left with no legal move. This solve uses the standard
  ruleset with NO flying (a man reduced to 3 is not granted free movement). Small
  rule choices can change perfect play (cf. Gasser's rule-variations work on nine
  men's morris), so the result is stated for this ruleset.

  RESULT — DRAW, strongly solved (this project). We computed the game-theoretic
  value of every one of the 42,372,745 reachable positions by retrograde analysis;
  the initial position is a draw. This fits the morris family: the diagonal-free
  morrises (Nine Men's, Lasker) are draws, and only Morabaraba — which adds
  diagonal mills — is a first-player win.

  ORIGINALITY — no prior published solution was found. Six men's morris is absent
  from the academic morris-solving literature (Gasser 1996; Gévay & Danner 2014,
  which solved its larger siblings) and from the main German Mühle community's
  published work (muehlespieler.de, which teaches the small variants but publishes
  no solved values). A private prior solve cannot be excluded, so this is claimed
  as the first *published* solution, not provably the first ever.

  VALIDATION is internal: (1) two independent implementations — bitmask and a
  cell-array version with a programmatically-derived board — agree exactly on the
  reachable-state count, the win/loss/draw split, and the draw; (2) the capture
  rules pass unit tests (mill detection, capture targeting incl. the all-in-mills
  exception, slide-captures, attrition loss); (3) five men's morris (same board,
  5 men) solves to 17,844,721 positions and is also a draw, a consistent data
  point. There is no smaller solved morris to cross-check against; the external
  gold-standard would be reproducing nine men's morris's known draw (~10^10
  states), which is deferred as a separate, larger build.
