notes: >
  ATTRIBUTION UNRESOLVED — citation gate not met. The task framed Six Men's
  Morris as a solved game, but an extensive search (Gasser's canonical Morris
  work, the Gevay/Danner Malom paper, the van den Herik/Hsu "Games solved"
  survey, Wikipedia's Solved-game and Game-complexity lists, the German Muhle
  literature, and the muehlespieler.de solver community) turned up NO primary
  source that establishes a game-theoretic value for Six Men's Morris. Zero
  independent primary sources confirm any result.

  What is actually documented: (1) Wikipedia does not list Six Men's Morris as a
  solved game; the "Six men's morris" title merely redirects to a variant
  section of the Nine Men's Morris article that gives only rules and history.
  (2) The major Morris-solver literature (Gasser 1993/1995/1996; Gevay & Danner
  Malom 2016 covering Nine Men's Morris, Lasker Morris, and Morabaraba;
  Stahlhacke's Lasker Morris work) does not address the six-piece variant.
  (3) The German muehlespieler.de solver enumerates solved variants as 3-, 5-,
  7-men, Lasker, and Morabaraba — a six-men variant is conspicuously absent.
  (4) Informal play guides (Cyningstan) state the first player has "considerable
  advantage," which contradicts the often-repeated "draw" folklore and is itself
  unsourced.

  The "draw" value in this record is the commonly-repeated informal claim, NOT a
  verified solver result; "weak" strength and "retrograde-analysis" method are
  placeholders by analogy to its larger sibling and should be treated as
  UNCONFIRMED. result, year, and solved_by could not be determined from any
  primary source and are intentionally left empty/uncertain rather than
  fabricated. A human reviewer should either locate the missing primary source
  or reclassify this game as not-rigorously-solved. Board: nine men's morris
  minus the outer square; 16 points, 6 pieces per side, no diagonals, no flying.
