id: six-mens-morris
name: Six men's morris
also_known_as:
  - "Six men's Merrills"
  - "Sechsmühle"
family: other
board: >
  Two concentric squares with the four side-midpoint connectors but WITHOUT the
  outer square of nine men's morris (i.e. the nine men's morris board minus its
  outer ring). 16 points. Each player has six pieces. Diagonal lines and
  "flying" are not used.
result: draw
