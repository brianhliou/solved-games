id: heads-up-limit-holdem
name: Heads-up Limit Texas Hold'em (HULHE)
also_known_as:
  - "HULHE"
  - "Heads-up limit hold'em"
  - "Cepheus"
family: imperfect-info
board: Two-player limit Texas hold'em; 52-card deck, four betting rounds (preflop/flop/turn/river), fixed bet sizes, capped raises per round, alternating dealer/button
result: first-player-win
result_detail: >
  Essentially weakly solved (NOT exactly solved): an epsilon-Nash equilibrium with
  exploitability 0.986 mbb/g (milli-big-blinds per game), below the 1 mbb/g threshold
  at which a human lifetime of play cannot statistically distinguish it from an exact
  solution at 95% confidence. The game is a win for the first player (the dealer/button):
  the strategy bounds the game-theoretic value at between 87.7 and 89.7 mbb/g in the
  dealer's favor, formally proving the dealer holds a substantial advantage. "first-player-win"
  here reflects the sign of the (real-valued, in-expectation) game value, not a discrete win.
strength: weak
approximate: true            # ε-Nash / "essentially weakly solved", not an exact solution
epsilon: "0.986 mbb/g (exploitability; below the ~1 mbb/g 'essentially solved' threshold)"
method:
  - monte-carlo-cfr
distance_to_result: >
  Computed strategy reached exploitability 0.986 mbb/g after 1579 CFR+ iterations
  (900 core-years). Game value bounded to dealer +87.7 to +89.7 mbb/g.
